[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[[output.formats]]
output_type = "gif"

[font]
family = "Iosevka Nerd Font Mono"

# ── Terminal: full cognitive workflow ──
[[scenes]]
type = "terminal"
name = "mnemonist-demo"
theme = "dracula"
cols = 100
rows = 35
frame_duration = 80

[scenes.intro]
text = "mnemonist\nAn open ecosystem for tool-agnostic AI agent memory"
duration = 2000
center = true

# Step 1: Ingest the codebase — auto-creates memory dir and embeds sources
[[scenes.interactions]]
type = "type"
text = "mnemonist learn ."
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2500

# Step 2: Memorize long-term knowledge (typed memories)
[[scenes.interactions]]
type = "type"
text = "mnemonist memorize \"prefer Rust for CLI tools\" -t feedback"
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# Step 3: Quick note into working memory inbox
[[scenes.interactions]]
type = "type"
text = "mnemonist note \"check async runtime choices for the index crate\""
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# Step 4: Consolidate — promote inbox, decay stale, re-embed
[[scenes.interactions]]
type = "type"
text = "mnemonist consolidate"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 3000

# Step 5: Semantic recall across memories
[[scenes.interactions]]
type = "type"
text = "mnemonist remember \"what language should I use for CLIs?\""
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 4000

# Step 6: Reflect — introspect all memories
[[scenes.interactions]]
type = "type"
text = "mnemonist reflect --all"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 3000

# Step 7: Fuzzy forget
[[scenes.interactions]]
type = "type"
text = "mnemonist forget prefer-rust"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# ── CLI help: show all cognitive commands ──
[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cols = 100
rows = 30
frame_duration = 80

[[scenes.interactions]]
type = "type"
text = "mnemonist --help"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000
