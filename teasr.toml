[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[[output.formats]]
output_type = "gif"

[font]
family = "Iosevka Nerd Font Mono"

# ── Full cognitive workflow ──
# wait.duration = command runtime + reading room (teasr 0.18.1 `wait` sleeps
# full duration then emits one frame; no idle-timer).
[[scenes]]
type = "terminal"
name = "mnemonist-demo"
theme = "dracula"
cols = 100
rows = 35
frame_duration = 80

[scenes.intro]
text = "mnemonist\nAn open ecosystem for tool-agnostic AI agent memory"
duration = 2000
center = true

# Step 1: Ingest a small slice of the codebase (full repo is ~26s — too slow for a README gif)
[[scenes.interactions]]
type = "type"
text = "mnemonist learn spec"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2500

# Step 2: Remember long-term knowledge (typed memory)
[[scenes.interactions]]
type = "type"
text = "mnemonist remember \"prefer Rust for CLI tools\" -t feedback"
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# Step 3: Defer a quick thought into the working memory inbox
[[scenes.interactions]]
type = "type"
text = "mnemonist remember --defer \"check async runtime choices for the index crate\""
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 1500

# Step 4: Consolidate — promote inbox, decay stale, re-embed
[[scenes.interactions]]
type = "type"
text = "mnemonist consolidate"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2500

# Step 5: Semantic recall across memories
[[scenes.interactions]]
type = "type"
text = "mnemonist recall \"what language should I use for CLIs?\""
speed = 35
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2500

# Step 6: Reflect — introspect all memories
[[scenes.interactions]]
type = "type"
text = "mnemonist reflect --all"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 3000

# Step 7: Fuzzy forget
[[scenes.interactions]]
type = "type"
text = "mnemonist forget prefer-rust"
speed = 40
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 1500

# ── CLI help: direct spawn — cleanest output, no shell prompt ──
[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cols = 100
rows = 30
frame_duration = 80
command = "mnemonist --help"
